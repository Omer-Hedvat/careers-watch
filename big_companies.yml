# big_companies.yml
# Manually maintained list of large established companies.
# careers_url + ats + ats_params must be verified by hand before activating an entry.
# Fields are merged into companies.json by refresh_companies.py.
# These entries are NEVER auto-scraped or auto-discovered - edit this file directly.
#
# To add a new company: fill all required fields, verify the ATS params work
# (e.g. uv run ats/greenhouse.py <board_token>), then run refresh_companies.py.
#
# Schema:
#   name            required - display name
#   website         required - company homepage
#   careers_url     required - manually verified ATS or careers page URL
#   ats             required - greenhouse | comeet | lever | workday | smartrecruiters | ashby | other
#   ats_params      required - dict of params the ATS puller needs (empty dict {} if ats=other or TODO)
#   category        required - cyber | fraud | fintech | security | general
#   location_filter optional - substring filter applied to job location field (case-insensitive)
#   notes           optional - free text

