name: Refresh Companies

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday 06:00 UTC (GitHub doesn't support /14 for bi-weekly)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Refresh companies
        run: uv run python refresh_companies.py

      - name: Commit updated companies.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add companies.json
          git diff --cached --quiet || git commit -m "chore: auto refresh companies $(date -u +%Y-%m-%d)"
          git push
