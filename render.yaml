services:
  - type: web
    name: careerwatch-api
    env: python
    region: oregon
    plan: free
    rootDir: webapp/backend
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: NEW_JOBS_PATH
        value: /opt/render/project/src/new_jobs.json
      - key: COMPANIES_PATH
        value: /opt/render/project/src/companies.json

  - type: web
    name: careerwatch-frontend
    env: node
    region: oregon
    plan: free
    rootDir: webapp/frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
